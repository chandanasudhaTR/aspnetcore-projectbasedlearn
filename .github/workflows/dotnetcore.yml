name: CI pipeline 
on:
  push:
    branches: [ master, main ]
  

jobs:
build-and-test:
   runs-on: ubuntu-latest

   steps:
    - name: checkout code
      uses: actions/checkout@v3

    - name: setup .net
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
    
    - name: run build script
      run: chmod +x ./build.sh && ./build.sh
